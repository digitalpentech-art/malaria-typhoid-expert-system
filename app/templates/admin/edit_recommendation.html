{% extends "base.html" %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-white py-3">
                    <h5 class="card-title fw-bold mb-0">Edit Recommendation: {{ rec.diagnosis_result }}</h5>
                </div>
                <div class="card-body p-4">
                    <form method="POST">
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Diagnosis Result</label>
                            <input type="text" class="form-control" value="{{ rec.diagnosis_result }}" disabled>
                            <div class="form-text">Diagnosis result cannot be changed. To change the diagnosis label, please delete and add a new recommendation.</div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Medical Advice</label>
                            <textarea name="advice_text" class="form-control" rows="6" required>{{ rec.advice_text }}</textarea>
                        </div>
                        <div class="d-flex justify-content-between gap-3">
                            <a href="{{ url_for('admin.manage_recommendations') }}" class="btn btn-outline-secondary px-4">
                                <svg class="icon-svg me-2" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 12H20v-2z"/></svg>Cancel
                            </a>
                            <button type="submit" class="btn btn-brand btn-lg px-5 fw-bold">
                                <svg class="icon-svg me-2" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M17 3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V7l-4-4zm-5 16c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3zm3-10H5V5h10v4z"/></svg>Update
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
