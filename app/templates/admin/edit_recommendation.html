{% extends "base.html" %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-white py-3">
                    <h5 class="card-title fw-bold mb-0">Edit Recommendation: {{ rec.diagnosis_result }}</h5>
                </div>
                <div class="card-body p-4">
                    <form method="POST">
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Diagnosis Result</label>
                            <input type="text" class="form-control" value="{{ rec.diagnosis_result }}" disabled>
                            <div class="form-text">Diagnosis result cannot be changed. To change the diagnosis label, please delete and add a new recommendation.</div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Medical Advice</label>
                            <textarea name="advice_text" class="form-control" rows="6" required>{{ rec.advice_text }}</textarea>
                        </div>
                        <div class="d-flex justify-content-between gap-3">
                            <a href="{{ url_for('admin.manage_recommendations') }}" class="btn btn-outline-secondary px-4">
                                <i class="fas fa-arrow-left me-2"></i>Cancel
                            </a>
                            <button type="submit" class="btn btn-brand btn-lg px-5 fw-bold">
                                <i class="fas fa-save me-2"></i>Update
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
