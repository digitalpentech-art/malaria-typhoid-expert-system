<!DOCTYPE html>
{% extends "base.html" %}

{% block content %}
<div class="max-w-4xl mx-auto">
    <div class="flex justify-between items-center mb-6">
        <h2 class="mb-6">{{ title }}</h2>
        <button type="button" class="btn btn-success" data-target="rule-modal">
            <i class="fas fa-plus mr-2"></i>Add New Rule
        </button>
    </div>

    <div class="card table-container">
        <table>
            <thead>
                <tr>
                    <th>Rule Name</th>
                    <th>Conclusion</th>
                    <th class="text-center">Priority</th>
                    <th class="text-center">Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for rule in rules %}
                <tr>
                    <td class="font-medium">{{ rule.rule_name }}</td>
                    <td>{{ rule.conclusion }}</td>
                    <td class="text-center">{{ rule.priority }}</td>
                    <td class="text-center">
                        <button class="text-blue-500 hover:text-blue-700 mx-2"><i class="fas fa-edit"></i></button>
                        <button class="text-red-500 hover:text-red-700 mx-2"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>
                {% endfor %}
                {% if not rules %}
                <tr>
                    <td colspan="4" class="text-center text-gray-500">No rules found.</td>
                </tr>
                {% endif %}
            </tbody>
        </table>
    </div>

    <!-- Modal for Adding/Editing Rule -->
    <div id="rule-modal" class="fixed inset-0 bg-gray-600 bg-opacity-50 hidden items-center justify-center z-50">
        <div class="card w-full max-w-2xl">
            <h3 class="mb-4">Add New Rule</h3>
            <form method="POST">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                    <div class="form-group">
                        <label>Rule Name</label>
                        <input type="text" name="rule_name" required>
                    </div>
                    <div class="form-group">
                        <label>Conclusion (e.g. Malaria)</label>
                        <input type="text" name="conclusion" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Minimum Matching Symptoms</label>
                    <input type="number" name="min_count" value="1" min="1" required>
                </div>
                <div class="form-group mb-4">
                    <label>Select Symptoms (Hold Ctrl/Cmd to multi-select)</label>
                    <select name="symptom_ids" multiple class="h-40" required>
                        {% for symptom in symptoms %}
                        <option value="{{ symptom.id }}">{{ symptom.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group mb-6">
                    <label>Priority (Higher = sooner)</label>
                    <input type="number" name="priority" value="0">
                </div>
                <div class="flex justify-end gap-4">
                    <button type="button" class="btn btn-secondary" onclick="document.getElementById('rule-modal').classList.add('hidden')">Cancel</button>
                    <button type="submit" class="btn btn-success">Save Rule</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    document.querySelector('[data-target="rule-modal"]').addEventListener('click', function() {
        document.getElementById('rule-modal').classList.remove('hidden');
        document.getElementById('rule-modal').classList.add('flex');
    });
</script>
{% endblock %}
