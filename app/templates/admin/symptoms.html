<!DOCTYPE html>
{% extends "base.html" %}

{% block content %}
<div class="max-w-4xl mx-auto">
    <div class="flex justify-between items-center mb-6">
        <h2 class="mb-6">{{ title }}</h2>
        <button type="button" class="btn btn-primary" data-target="symptom-modal">
            <i class="fas fa-plus mr-2"></i>Add New Symptom
        </button>
    </div>

    <div class="card table-container">
        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Description</th>
                    <th>Category</th>
                    <th class="text-center">Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for symptom in symptoms %}
                <tr>
                    <td class="font-medium">{{ symptom.name }}</td>
                    <td>{{ symptom.description }}</td>
                    <td>
                        <span class="font-semibold 
                            {% if symptom.category == 'Malaria' %} text-green-600
                            {% elif symptom.category == 'Typhoid' %} text-blue-600
                            {% else %} text-gray-600
                            {% endif %}">
                            {{ symptom.category }}
                        </span>
                    </td>
                    <td class="text-center">
                        <button class="text-blue-500 hover:text-blue-700 mx-2"><i class="fas fa-edit"></i></button>
                        <button class="text-red-500 hover:text-red-700 mx-2"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>
                {% endfor %}
                {% if not symptoms %}
                <tr>
                    <td colspan="4" class="text-center text-gray-500">No symptoms found.</td>
                </tr>
                {% endif %}
            </tbody>
        </table>
    </div>

    <!-- Modal for Adding/Editing Symptom (Simplified) -->
    <div id="symptom-modal" class="fixed inset-0 bg-gray-600 bg-opacity-50 hidden items-center justify-center z-50">
        <div class="card w-full max-w-md">
            <h3 class="mb-4">Add New Symptom</h3>
            <form method="POST" action="{{ url_for('admin.manage_symptoms') }}">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" name="name" required>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea name="description"></textarea>
                </div>
                <div class="form-group mb-6">
                    <label>Category</label>
                    <select name="category">
                        <option value="General">General</option>
                        <option value="Malaria">Malaria</option>
                        <option value="Typhoid">Typhoid</option>
                    </select>
                </div>
                <div class="flex justify-end gap-4">
                    <button type="button" class="btn btn-secondary" onclick="document.getElementById('symptom-modal').classList.add('hidden')">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    // Basic Modal Toggle
    document.querySelector('[data-target="symptom-modal"]').addEventListener('click', function() {
        document.getElementById('symptom-modal').classList.remove('hidden');
        document.getElementById('symptom-modal').classList.add('flex');
    });
</script>
{% endblock %}
