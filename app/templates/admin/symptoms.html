{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-10">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold mb-0">{{ title }}</h2>
            <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#symptomModal">
                <i class="fas fa-plus me-2"></i>Add New Symptom
            </button>
        </div>

        <div class="card shadow-sm border-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th class="ps-4">Name</th>
                            <th>Description</th>
                            <th>Category</th>
                            <th class="text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for symptom in symptoms %}
                        <tr>
                            <td class="ps-4 fw-medium">{{ symptom.name }}</td>
                            <td>{{ symptom.description }}</td>
                            <td>
                                <span class="badge 
                                    {% if symptom.category == 'Malaria' %} bg-success
                                    {% elif symptom.category == 'Typhoid' %} bg-primary
                                    {% else %} bg-secondary
                                    {% endif %}">
                                    {{ symptom.category }}
                                </span>
                            </td>
                            <td class="text-center">
                                <a href="{{ url_for('admin.edit_symptom', symptom_id=symptom.id) }}" class="btn btn-sm btn-outline-primary me-1"><i class="fas fa-edit"></i></a>
                                <form action="{{ url_for('admin.delete_symptom', symptom_id=symptom.id) }}" method="POST" style="display:inline;" onsubmit="return confirm('Are you sure you want to delete this symptom?');">
                                    <button type="submit" class="btn btn-sm btn-outline-danger"><i class="fas fa-trash"></i></button>
                                </form>
                            </td>
                        </tr>
                        {% endfor %}
                        {% if not symptoms %}
                        <tr>
                            <td colspan="4" class="text-center text-muted py-4">No symptoms found.</td>
                        </tr>
                        {% endif %}
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Modal for Adding Symptom -->
        <div class="modal fade" id="symptomModal" tabindex="-1" aria-labelledby="symptomModalLabel" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title fw-bold" id="symptomModalLabel">Add New Symptom</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <form method="POST" action="{{ url_for('admin.manage_symptoms') }}">
                        <div class="modal-body">
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Name</label>
                                <input type="text" name="name" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Description</label>
                                <textarea name="description" class="form-control" rows="3"></textarea>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Category</label>
                                <select name="category" class="form-select" required>
                                    <option value="General">General</option>
                                    <option value="Malaria">Malaria</option>
                                    <option value="Typhoid">Typhoid</option>
                                </select>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                            <button type="submit" class="btn btn-primary">Save Symptom</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
