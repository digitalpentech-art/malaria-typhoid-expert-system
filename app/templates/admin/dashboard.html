<!DOCTYPE html>
{% extends "base.html" %}

{% block content %}
<div class="max-w-3xl mx-auto">
    <h2 class="mb-6">{{ title }}</h2>
    
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
        <div class="card border-t-4 border-blue-500">
            <div class="text-gray-500 text-sm font-semibold uppercase">Total Symptoms</div>
            <div class="text-3xl font-bold">{{ symptoms_count }}</div>
        </div>
        <div class="card border-t-4 border-green-500">
            <div class="text-gray-500 text-sm font-semibold uppercase">Total Rules</div>
            <div class="text-3xl font-bold">{{ rules_count }}</div>
        </div>
        <div class="card border-t-4 border-purple-500">
            <div class="text-gray-500 text-sm font-semibold uppercase">Diagnoses</div>
            <div class="text-3xl font-bold">{{ diagnoses_count }}</div>
        </div>
        <div class="card border-t-4 border-yellow-500">
            <div class="text-gray-500 text-sm font-semibold uppercase">Users</div>
            <div class="text-3xl font-bold">{{ users_count }}</div>
        </div>
    </div>

    <div class="space-y-6">
        <div class="flex justify-between items-center">
            <h3 class="text-xl font-bold">Quick Actions</h3>
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
            <a href="{{ url_for('admin.manage_symptoms') }}" class="card text-center p-4">
                <i class="fas fa-stethoscope text-blue-500 text-2xl mb-2"></i>
                <span class="text-sm font-medium">Manage Symptoms</span>
            </a>
            <a href="{{ url_for('admin.manage_rules') }}" class="card text-center p-4">
                <i class="fas fa-brain text-green-500 text-2xl mb-2"></i>
                <span class="text-sm font-medium">Manage Rules</span>
            </a>
            <a href="{{ url_for('admin.manage_recommendations') }}" class="card text-center p-4">
                <i class="fas fa-file-medical text-purple-500 text-2xl mb-2"></i>
                <span class="text-sm font-medium">Recommendations</span>
            </a>
        </div>
    </div>
</div>
{% endblock %}
