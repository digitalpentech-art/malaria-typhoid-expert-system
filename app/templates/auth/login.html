<!DOCTYPE html>
{% extends "base.html" %}

{% block content %}
<div class="card max-w-md mx-auto">
    <h2 class="text-center font-bold mb-6">{{ title }}</h2>
    <form method="POST">
        {{ form.hidden_tag() }}
        <div class="form-group">
            {{ form.username.label }}
            {{ form.username(class="w-full") }}
        </div>
        <div class="form-group mb-6">
            {{ form.password.label }}
            {{ form.password(class="w-full") }}
        </div>
        <div class="form-group">
            <button class="btn btn-primary w-full" type="submit">{{ form.submit.label }}</button>
        </div>
    </form>
    <div class="mt-4 text-center">
        <p class="text-sm">
            Don't have an account? <a href="{{ url_for('auth.register') }}" class="text-blue-600 hover:underline">Register here</a>
        </p>
    </div>
</div>
{% endblock %}
