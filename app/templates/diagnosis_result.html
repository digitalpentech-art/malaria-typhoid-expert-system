{% extends "base.html" %}

{% block content %}
<div class="max-w-3xl mx-auto text-center">
    <div class="card diagnosis-card">
        <div class="mb-8">
            {% if result == 'Unknown' %}
            <div class="icon-circle icon-yellow">
                <i class="fas fa-circle-question text-4xl"></i>
            </div>
            {% else %}
            <div class="icon-circle icon-green">
                <i class="fas fa-stethoscope text-4xl"></i>
            </div>
            {% endif %}
        </div>
        
        <div class="mb-10">
            <span class="text-sm font-bold uppercase tracking-widest text-muted mb-2 block">Analysis Result</span>
            <h2 class="text-5xl font-extrabold mb-4">{{ result }}</h2>
            <p class="text-xl text-gray-600 leading-relaxed max-w-lg mx-auto">{{ explanation }}</p>
        </div>
        
        <div class="advice-box">
            <h3><i class="fas fa-clipboard-list mr-2"></i> Clinical Recommendations</h3>
            <p class="text-lg leading-relaxed text-gray-700">{{ advice }}</p>
        </div>
        
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mt-10">
            <a href="{{ url_for('main.symptom_checker') }}" class="btn btn-primary py-4 text-lg">
                <i class="fas fa-rotate-left mr-2"></i> Re-analyze
            </a>
            <a href="{{ url_for('main.history') }}" class="btn btn-secondary py-4 text-lg">
                <i class="fas fa-folder-open mr-2"></i> My Reports
            </a>
        </div>
    </div>
</div>
{% endblock %}
