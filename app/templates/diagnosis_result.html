{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card shadow-lg border-0 text-center p-4 p-md-5">
            <!-- Status Icon -->
            <div class="mb-4">
                {% if result == 'Unknown' %}
                <div class="mx-auto icon-box icon-box-lg icon-box-secondary">
                    <i class="fa-solid fa-circle-question"></i>
                </div>
                {% else %}
                <div class="mx-auto icon-box icon-box-lg icon-box-success">
                    <i class="fa-solid fa-stethoscope"></i>
                </div>
                {% endif %}
            </div>

            <!-- Result Header -->
            <div class="mb-5">
                <span class="text-uppercase fw-bold text-muted small ls-wide">Analysis Result</span>
                <h1 class="display-4 fw-extrabold text-dark mt-2">{{ result }}</h1>
                <p class="lead text-secondary mx-auto" style="max-width: 600px;">{{ explanation }}</p>
            </div>

            <!-- Recommendation Box -->
            <div class="alert {{ 'alert-primary' if result in ['Unknown', 'Typhoid'] else 'alert-primary' }} border-0 {{ 'bg-primary' if result in ['Unknown', 'Typhoid'] else 'bg-primary bg-opacity-10' }} text-start p-4 mb-5 shadow-sm" style="border-left: 4px solid {{ '#ffffff' if result in ['Unknown', 'Typhoid'] else '#2563eb' }} !important;">
                <div class="d-flex align-items-center mb-3">
                    <div class="icon-box icon-box-sm {{ 'icon-box-light' if result in ['Unknown', 'Typhoid'] else 'icon-box-primary' }} me-3" style="{{ 'background-color: rgba(255, 255, 255, 0.2); color: white;' if result in ['Unknown', 'Typhoid'] }}">
                        <i class="fa-solid {{ 'fa-circle-info' if result == 'Unknown' else 'fa-clipboard-list' }}"></i>
                    </div>
                    <h4 class="h5 fw-bold mb-0 {{ 'text-white' if result in ['Unknown', 'Typhoid'] }}">Clinical Recommendations</h4>
                </div>
                <p class="mb-0 fs-5 {{ 'text-white' if result in ['Unknown', 'Typhoid'] else 'text-dark' }} fw-medium">
                    {{ advice }}
                </p>
            </div>

            <!-- Action Buttons -->
            <div class="row g-3">
                <div class="col-sm-6">
                    <a href="{{ url_for('main.symptom_checker') }}" class="btn btn-primary btn-lg w-100 shadow-sm">
                        <i class="fa-solid fa-rotate-left me-2"></i>Re-analyze
                    </a>
                </div>
                <div class="col-sm-6">
                    <a href="{{ url_for('main.history') }}" class="btn btn-outline-primary btn-lg w-100">
                        <i class="fa-solid fa-folder-open me-2"></i>My Reports
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .fw-extrabold { font-weight: 800; }
    .ls-wide { letter-spacing: 0.1em; }
</style>
{% endblock %}
