{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card shadow-lg border-0 text-center p-4 p-md-5">
            <!-- Status Icon -->
            <div class="mb-4">
                {% if result == 'Unknown' %}
                <div class="mx-auto d-flex align-items-center justify-content-center rounded-circle bg-warning bg-opacity-10 text-warning" style="width: 80px; height: 80px; font-size: 2.5rem;">
                    <i class="fas fa-circle-question"></i>
                </div>
                {% else %}
                <div class="mx-auto d-flex align-items-center justify-content-center rounded-circle bg-success bg-opacity-10 text-success" style="width: 80px; height: 80px; font-size: 2.5rem;">
                    <i class="fas fa-stethoscope"></i>
                </div>
                {% endif %}
            </div>

            <!-- Result Header -->
            <div class="mb-5">
                <span class="text-uppercase fw-bold text-muted small ls-wide">Analysis Result</span>
                <h1 class="display-4 fw-extrabold text-dark mt-2">{{ result }}</h1>
                <p class="lead text-secondary mx-auto" style="max-width: 600px;">{{ explanation }}</p>
            </div>

            <!-- Recommendation Box -->
            <div class="alert alert-primary border-0 bg-primary bg-opacity-10 text-start p-4 mb-5">
                <h4 class="h5 fw-bold mb-3">
                    <i class="fas fa-clipboard-list me-2"></i>Clinical Recommendations
                </h4>
                <p class="mb-0 fs-5 text-dark">{{ advice }}</p>
            </div>

            <!-- Action Buttons -->
            <div class="row g-3">
                <div class="col-sm-6">
                    <a href="{{ url_for('main.symptom_checker') }}" class="btn btn-primary btn-lg w-100 shadow-sm">
                        <i class="fas fa-rotate-left me-2"></i>Re-analyze
                    </a>
                </div>
                <div class="col-sm-6">
                    <a href="{{ url_for('main.history') }}" class="btn btn-outline-primary btn-lg w-100">
                        <i class="fas fa-folder-open me-2"></i>My Reports
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .fw-extrabold { font-weight: 800; }
    .ls-wide { letter-spacing: 0.1em; }
</style>
{% endblock %}
