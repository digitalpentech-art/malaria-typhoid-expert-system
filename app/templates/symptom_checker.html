<!DOCTYPE html>
{% extends "base.html" %}

{% block content %}
<div class="max-w-3xl mx-auto">
    <h2 class="mb-6">{{ title }}</h2>
    <form method="POST" class="card">
        {{ form.hidden_tag() }}
        <p class="mb-6">Please select all the symptoms you are currently experiencing:</p>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
            {% for symptom in symptoms %}
            <label class="symptom-label">
                <input type="checkbox" name="symptoms" value="{{ symptom.id }}" class="w-5 h-5 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
                <div class="ml-3">
                    <span class="block font-semibold">{{ symptom.name }}</span>
                    <span class="block text-sm text-gray-500">{{ symptom.description }}</span>
                </div>
            </label>
            {% endfor %}
        </div>

        <div class="flex justify-end">
            <button type="submit" class="btn btn-primary px-8 py-3">
                Analyze Symptoms
            </button>
        </div>
    </form>
</div>
{% endblock %}
